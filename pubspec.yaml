name: mozi_v2
description: "Mozi - Ride hailing & food delivery app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  go_router: ^14.6.2

  # HTTP & networking
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Functional programming
  dartz: ^0.10.1

  # Security storage
  flutter_secure_storage: ^9.2.2

  # Biometric authentication
  local_auth: ^2.3.0

  # Local caching
  hive_flutter: ^1.1.0

  # OTP / PIN input
  pin_code_fields: ^8.0.1

  # Image loading
  cached_network_image: ^3.4.1

  # Animations
  lottie: ^3.1.3
  shimmer: ^3.0.0

  # Utilities
  connectivity_plus: ^6.1.1
  permission_handler: ^11.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  injectable_generator: ^2.6.2
  build_runner: ^2.4.13
  retrofit_generator: ^9.1.5
  json_serializable: ^6.9.0
  json_annotation: ^4.9.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
